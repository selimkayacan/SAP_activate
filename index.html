<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SAP Activate | PM Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F0F2F7;--srf:#fff;--sf2:#F8F9FC;--bd:#E2E6EF;
  --tx:#0F172A;--tx2:#475569;--tx3:#94A3B8;--navy:#0F172A;
  --r:10px;--rs:6px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --sh2:0 4px 24px rgba(0,0,0,.14);
  --fn:'Lexend',sans-serif;--mo:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);font-size:13px;line-height:1.5;min-height:100vh;}

.hdr{background:var(--navy);color:#fff;height:50px;display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:300;box-shadow:0 2px 10px rgba(0,0,0,.3);}
.logo{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.logo-sap{color:#F0AB00;}
.logo-sep{width:1px;height:16px;background:rgba(255,255,255,.2);}
.logo-sub{font-size:11px;font-weight:400;color:rgba(255,255,255,.5);}
.proj-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600;color:#fff;cursor:pointer;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.proj-badge:hover{background:rgba(255,255,255,.22);}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:7px;}
.btn{padding:5px 12px;border-radius:var(--rs);font-size:11px;font-weight:600;font-family:var(--fn);cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
.btn-p{background:#1D4ED8;color:#fff;}.btn-p:hover{background:#1e40af;}
.btn-s{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);}.btn-s:hover{background:rgba(255,255,255,.22);}
.btn-d{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd);}.btn-d:hover{background:var(--bd);}
.btn-g{background:#F0AB00;color:var(--navy);}.btn-g:hover{background:#d99e00;}
.btn-ok{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;}
.btn-danger{background:#FEE2E2;color:#DC2626;border:1px solid #FCA5A5;}
.btn-full{width:100%;justify-content:center;}
.btn-back{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:4px 10px;font-size:11px;}.btn-back:hover{background:rgba(255,255,255,.25);}

.main{padding:14px 16px;}

/* PROJECT PICKER */
.picker-wrap{max-width:520px;margin:50px auto 0;background:var(--srf);border-radius:var(--r);box-shadow:var(--sh2);overflow:hidden;}
.picker-hdr{background:var(--navy);padding:22px 22px 18px;color:#fff;}
.picker-title{font-size:19px;font-weight:800;margin-bottom:3px;}
.picker-sub{font-size:11px;color:rgba(255,255,255,.5);}
.picker-body{padding:18px 22px;}
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);margin-bottom:9px;}
.new-row{display:flex;gap:8px;margin-bottom:18px;}
.fi{width:100%;padding:8px 11px;border:1px solid var(--bd);border-radius:var(--rs);font-family:var(--fn);font-size:12px;background:var(--srf);color:var(--tx);outline:none;}
.fi:focus{border-color:#1D4ED8;}
.proj-list{display:flex;flex-direction:column;gap:5px;max-height:280px;overflow-y:auto;}
.proj-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--bd);border-radius:var(--rs);cursor:pointer;transition:all .15s;}
.proj-item:hover{border-color:#1D4ED8;background:#EFF6FF;}
.pi-ico{font-size:15px;}
.pi-name{font-size:12px;font-weight:600;flex:1;}
.pi-date{font-size:10px;color:var(--tx3);}
.pi-del{font-size:11px;color:var(--tx3);padding:2px 6px;border-radius:3px;cursor:pointer;}.pi-del:hover{background:#FEE2E2;color:#DC2626;}
.empty-msg{text-align:center;color:var(--tx3);font-size:12px;padding:22px;}

/* LEGEND */
.lgnd{background:var(--srf);border-bottom:1px solid var(--bd);padding:6px 16px;display:flex;align-items:center;gap:14px;font-size:11px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:4px;color:var(--tx2);}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* MATRIX */
.mx-outer{background:var(--srf);border-radius:var(--r);box-shadow:var(--sh);overflow:auto;}
.mx-table{width:100%;border-collapse:collapse;min-width:920px;}
.mxh-ws{background:var(--sf2);padding:8px 12px;font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;border-right:2px solid var(--bd);border-bottom:2px solid var(--bd);position:sticky;left:0;z-index:2;min-width:155px;}
.mxh-ph{padding:9px 10px;text-align:center;border-right:1px solid rgba(255,255,255,.2);border-bottom:2px solid var(--bd);vertical-align:middle;cursor:pointer;transition:opacity .15s;}
.mxh-ph:hover{opacity:.85;}
.mxh-ph:last-child{border-right:none;}
.ph-name-big{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.ph-click-hint{font-size:9px;color:rgba(255,255,255,.6);margin-top:2px;}
.mx-ws{background:var(--sf2);padding:7px 12px;border-right:2px solid var(--bd);border-bottom:1px solid var(--bd);font-size:11px;font-weight:500;vertical-align:top;position:sticky;left:0;z-index:1;min-width:155px;}
.mx-td{padding:5px 6px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);vertical-align:top;min-height:54px;}
.mx-td:last-child{border-right:none;}
.mx-td.clickable:hover{background:#F1F5FF;cursor:pointer;}
.mx-td.empty{cursor:default;background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.013) 4px,rgba(0,0,0,.013) 8px);}
.chip{display:flex;align-items:center;gap:4px;padding:3px 5px;margin-bottom:2px;border-radius:4px;font-size:10px;cursor:pointer;transition:background .1s;line-height:1.3;}
.chip:hover{background:rgba(0,0,0,.05);}
.cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.cname{flex:1;color:var(--tx2);}
.cname.cy{color:#92400E;font-weight:600;}
.cname.cg{color:#14532D;font-weight:600;}
.cpct{font-size:9px;font-family:var(--mo);color:var(--tx3);}
.mx-foot{border-top:2px solid var(--bd);}
.mxf-ws{background:var(--sf2);padding:6px 12px;font-size:10px;font-weight:600;color:var(--tx3);border-right:2px solid var(--bd);position:sticky;left:0;z-index:1;}
.mxf-ph{padding:8px 10px;text-align:center;border-right:1px solid var(--bd);}
.mxf-ph:last-child{border-right:none;}
.ph-pct{font-size:15px;font-weight:800;font-family:var(--mo);}
.ph-desc{font-size:10px;margin-top:2px;}
.ph-qg{display:inline-flex;align-items:center;gap:2px;padding:1px 7px;border-radius:10px;font-size:9px;font-weight:700;margin-top:3px;background:rgba(0,0,0,.06);}

/* ══════════════════════════════════
   PHASE DETAIL PAGE
══════════════════════════════════ */
.ph-detail{display:none;}
.ph-detail.show{display:block;}

.ph-hero{padding:18px 20px;color:#fff;border-radius:var(--r) var(--r) 0 0;display:flex;align-items:center;gap:14px;}
.ph-hero-left{flex:1;}
.ph-hero-name{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.ph-hero-desc{font-size:12px;opacity:.75;margin-top:2px;}
.ph-hero-stats{display:flex;gap:16px;margin-top:10px;}
.ph-stat{text-align:center;}
.ph-stat-n{font-size:20px;font-weight:800;font-family:var(--mo);}
.ph-stat-l{font-size:10px;opacity:.7;margin-top:1px;}
.ph-hero-pct{font-size:42px;font-weight:800;font-family:var(--mo);opacity:.9;}

.ph-content{background:var(--srf);border-radius:0 0 var(--r) var(--r);box-shadow:var(--sh);}

/* Workstream sections */
.ws-section{border-bottom:1px solid var(--bd);}
.ws-section:last-child{border-bottom:none;}
.ws-header{padding:10px 16px;background:var(--sf2);display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.ws-header:hover{background:#EFF6FF;}
.ws-header-name{font-size:12px;font-weight:700;color:var(--tx);flex:1;}
.ws-header-stats{font-size:10px;color:var(--tx3);font-family:var(--mo);}
.ws-toggle{font-size:11px;color:var(--tx3);transition:transform .2s;}
.ws-toggle.open{transform:rotate(90deg);}
.ws-body{display:none;padding:0 0 8px 0;}
.ws-body.open{display:block;}

/* L2 task blocks */
.l2-block{margin:8px 14px 0 14px;border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden;}
.l2-header{padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;background:var(--sf2);}
.l2-header:hover{background:#EFF6FF;}
.l2-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.l2-name{font-size:11px;font-weight:700;color:var(--tx);flex:1;}
.l2-pctbadge{font-size:10px;font-family:var(--mo);color:var(--tx3);background:var(--bg);padding:1px 6px;border-radius:10px;}
.l2-statusbadge{font-size:9px;font-weight:600;padding:1px 7px;border-radius:10px;}
.l2-toggle{font-size:10px;color:var(--tx3);transition:transform .2s;}
.l2-toggle.open{transform:rotate(90deg);}

.l2-detail{display:none;padding:10px 12px;border-top:1px solid var(--bd);background:#fff;}
.l2-detail.open{display:block;}

/* Tooltip */
.l2-tooltip{background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--rs);padding:8px 11px;margin-bottom:10px;font-size:11px;color:#78350F;line-height:1.5;}
.l2-tooltip-icon{font-size:13px;margin-right:4px;}

/* L3 tasks inside phase detail */
.l3-progress-list{list-style:none;}
.l3-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd);flex-wrap:wrap;}
.l3-row:last-child{border-bottom:none;}
.l3-chk{width:15px;height:15px;border:1.5px solid var(--bd);border-radius:3px;cursor:pointer;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;}
.l3-chk.done{background:#22C55E;border-color:#22C55E;color:#fff;}
/* tooltip wrapper */
.l3-tip-wrap{position:relative;flex:1;min-width:0;}
.l3-text{font-size:11px;line-height:1.5;color:var(--tx2);cursor:default;}
.l3-text.done{text-decoration:line-through;color:var(--tx3);}
.l3-tip-popup{display:none;position:absolute;left:0;top:calc(100% + 4px);z-index:999;
  background:#1E293B;color:#E2E8F0;border-radius:var(--rs);padding:9px 12px;
  font-size:11px;line-height:1.6;max-width:320px;min-width:180px;
  box-shadow:0 6px 24px rgba(0,0,0,.3);pointer-events:none;}
.l3-tip-popup strong{color:#F0AB00;}
.l3-tip-popup::before{content:'';position:absolute;top:-5px;left:12px;
  width:0;height:0;border:5px solid transparent;border-bottom-color:#1E293B;border-top:none;}
.l3-tip-wrap:hover .l3-tip-popup{display:block;}
/* progress expand button */
.l3-prog-btn{flex-shrink:0;font-size:10px;color:var(--tx3);cursor:pointer;padding:1px 5px;border-radius:3px;border:1px solid var(--bd);background:var(--sf2);line-height:1.4;}
.l3-prog-btn:hover{background:#EFF6FF;color:#1D4ED8;border-color:#1D4ED8;}
.l3-prog-btn.active{background:#EFF6FF;color:#1D4ED8;border-color:#1D4ED8;}
/* L3 progress panel */
.l3-prog-panel{display:none;width:100%;margin-left:23px;margin-top:4px;margin-bottom:4px;
  padding:10px 12px;background:#F0F6FF;border:1px solid #BFDBFE;border-radius:var(--rs);}
.l3-prog-panel.open{display:block;}
.l3-prog-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap;}
.l3-prog-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#64748B;width:46px;flex-shrink:0;}
.l3-mini-sl{flex:1;min-width:60px;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--bd);outline:none;}
.l3-mini-sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#1D4ED8;cursor:pointer;}
.l3-mini-pv{font-family:var(--mo);font-size:10px;font-weight:700;width:28px;text-align:right;}
.l3-st-row{display:flex;gap:3px;flex-wrap:wrap;}
.l3-stb{padding:1px 8px;border-radius:8px;font-size:9px;font-weight:700;cursor:pointer;border:1.5px solid transparent;font-family:var(--fn);}
.l3-stb.ns{background:#F1F5F9;color:#64748B;border-color:#CBD5E1;}
.l3-stb.ip{background:#FEF3C7;color:#D97706;border-color:#F59E0B;}
.l3-stb.dn{background:#DCFCE7;color:#16A34A;border-color:#22C55E;}
.l3-stb.bl{background:#FEE2E2;color:#DC2626;border-color:#EF4444;}
.l3-stb.act{box-shadow:0 0 0 2px currentColor;}
.l3-inp{font-size:10px;font-family:var(--fn);border:1px solid var(--bd);border-radius:3px;padding:2px 7px;background:var(--srf);color:var(--tx);flex:1;min-width:80px;}
.l3-inp:focus{outline:none;border-color:#1D4ED8;}
.l3-save{padding:2px 9px;font-size:10px;background:#1D4ED8;color:#fff;border:none;border-radius:3px;cursor:pointer;font-family:var(--fn);font-weight:600;}
.l3-save:hover{background:#1e40af;}
.l3-owner-inp{font-size:10px;font-family:var(--fn);border:1px solid var(--bd);border-radius:3px;padding:1px 5px;width:90px;color:var(--tx2);background:var(--sf2);}
.l3-owner-inp:focus{outline:none;border-color:#1D4ED8;}

/* L2 progress controls inside phase detail */
.l2-controls{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);flex-wrap:wrap;}
.l2-ctrl-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);}
.mini-psl{flex:1;min-width:80px;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--bg);outline:none;}
.mini-psl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#1D4ED8;cursor:pointer;}
.mini-pv{font-family:var(--mo);font-size:11px;font-weight:600;width:30px;}
.mini-st-btns{display:flex;gap:4px;}
.mini-st{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid transparent;font-family:var(--fn);}
.mini-st.ns{background:#F1F5F9;color:#64748B;border-color:#CBD5E1;}
.mini-st.ip{background:#FEF3C7;color:#D97706;border-color:#F59E0B;}
.mini-st.dn{background:#DCFCE7;color:#16A34A;border-color:#22C55E;}
.mini-st.bl{background:#FEE2E2;color:#DC2626;border-color:#EF4444;}
.mini-st.act{box-shadow:0 0 0 2px currentColor;}
.l2-owner-row{display:flex;gap:7px;align-items:center;margin-top:6px;}
.l2-owner-inp{font-size:11px;font-family:var(--fn);border:1px solid var(--bd);border-radius:var(--rs);padding:3px 8px;flex:1;color:var(--tx);background:var(--sf2);}
.l2-owner-inp:focus{outline:none;border-color:#1D4ED8;}
.save-mini{padding:3px 10px;font-size:10px;background:#1D4ED8;color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-family:var(--fn);font-weight:600;}
.save-mini:hover{background:#1e40af;}

/* DRAWER */
.drw-bg{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:400;display:none;}
.drw-bg.show{display:block;}
.drw{position:fixed;top:0;right:0;bottom:0;width:680px;max-width:96vw;background:var(--srf);box-shadow:-4px 0 24px rgba(0,0,0,.15);z-index:500;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s ease;}
.drw.open{transform:translateX(0);}
.drw-hdr{padding:13px 16px;border-bottom:1px solid var(--bd);background:var(--sf2);}
.drw-title{font-size:14px;font-weight:700;margin-bottom:5px;line-height:1.3;padding-right:28px;position:relative;}
.drw-close{position:absolute;top:0;right:0;font-size:16px;cursor:pointer;color:var(--tx3);padding:2px 5px;border-radius:4px;}.drw-close:hover{background:var(--bd);color:var(--tx);}
.drw-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--sf2);}
.tab{padding:8px 14px;font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--tx2);white-space:nowrap;}
.tab.act{color:#1D4ED8;border-bottom-color:#1D4ED8;background:var(--srf);}
.drw-body{padding:15px;overflow-y:auto;flex:1;}

/* STATUS BADGES */
.sb{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
.s-ns{background:#F1F5F9;color:#64748B;}.s-ip{background:#FEF3C7;color:#D97706;}
.s-dn{background:#DCFCE7;color:#16A34A;}.s-bl{background:#FEE2E2;color:#DC2626;}
.s-rv{background:#EDE9FE;color:#7C3AED;}
.s-df{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;}
.s-ap{background:#DCFCE7;color:#14532D;border:1px solid #BBF7D0;}

.stt{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);margin-bottom:8px;}
.l3-list{list-style:none;}
.l3-item{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px;}
.l3-item:last-child{border-bottom:none;}
.chk{width:14px;height:14px;border:1.5px solid var(--bd);border-radius:3px;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:8px;transition:all .15s;}
.chk.dn{background:#22C55E;border-color:#22C55E;color:#fff;}
.task-txt{flex:1;line-height:1.4;}
.task-txt.done{text-decoration:line-through;color:var(--tx3);}
.task-txt.del{text-decoration:line-through;color:#FCA5A5;}
.rm-btn{font-size:11px;color:var(--tx3);cursor:pointer;padding:1px 4px;border-radius:3px;flex-shrink:0;line-height:1;}.rm-btn:hover{background:#FEE2E2;color:#DC2626;}
.add-row{display:flex;gap:7px;margin-top:10px;}
.stbns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px;}
.sbn{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;font-family:var(--fn);}
.sbn-ns{background:#F1F5F9;color:var(--tx2);border-color:var(--bd);}
.sbn-ip{background:#FEF3C7;color:#D97706;border-color:#F59E0B;}
.sbn-dn{background:#DCFCE7;color:#16A34A;border-color:#22C55E;}
.sbn-bl{background:#FEE2E2;color:#DC2626;border-color:#EF4444;}
.sbn-rv{background:#EDE9FE;color:#7C3AED;border-color:#8B5CF6;}
.sbn.act{box-shadow:0 0 0 2px currentColor;}
.slr{display:flex;align-items:center;gap:9px;margin-bottom:11px;}
.psl{flex:1;-webkit-appearance:none;height:5px;border-radius:3px;background:var(--bg);outline:none;}
.psl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#1D4ED8;cursor:pointer;}
.pv{font-family:var(--mo);font-size:12px;font-weight:600;width:34px;text-align:right;}
.ff{margin-bottom:10px;}
.fl{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:3px;display:block;}
.fta{width:100%;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--rs);font-family:var(--fn);font-size:12px;background:var(--srf);color:var(--tx);outline:none;resize:vertical;min-height:64px;}
.fta:focus{border-color:#1D4ED8;}
.upz{border:2px dashed var(--bd);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;transition:all .2s;background:var(--sf2);margin-bottom:10px;}
.upz:hover{border-color:#1D4ED8;background:#EFF6FF;}
.upz.ld{border-color:#22C55E;background:#F0FDF4;}
.upz-ico{font-size:22px;margin-bottom:5px;}
.upz-name{font-size:11px;font-weight:500;color:var(--tx2);}

.spn{width:30px;height:30px;border:3px solid var(--bg);border-top-color:#1D4ED8;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}

.toast{position:fixed;bottom:16px;right:16px;background:var(--navy);color:#fff;padding:8px 14px;border-radius:var(--r);font-size:12px;box-shadow:var(--sh2);transform:translateY(36px);opacity:0;transition:all .2s;z-index:700;}

.hidden{display:none!important;}
.fade{animation:fi .18s ease;}

.row{display:flex;align-items:center;gap:8px;}
.mt2{margin-top:8px;}.mt3{margin-top:12px;}
.txm{color:var(--tx3);}.txs{font-size:11px;}

let PROJS={}, CUR=null;
let DS={ws:null,ph:null,l2:null,tab:'tasks'};
let CF={};
let VIEW='matrix'; // 'matrix' | 'phase'
let ACTIVE_PH=null;

function save(){try{localStorage.setItem('sap_pm5',JSON.stringify(PROJS));}catch(e){}}
function load(){try{PROJS=JSON.parse(localStorage.getItem('sap_pm5')||'{}');}catch(e){}}
load();
if(Object.keys(PROJS).length>0&&!CUR) CUR=Object.keys(PROJS)[0];

function proj(){return PROJS[CUR];}
function td(k){return (proj()?.tasks||{})[k]||{st:'ns',pct:0,notes:'',owner:'',due:'',chk:{},del:{},extra:[],l3chk:{},l3owner:{},ai:null,air:null};}
function stC(s){return {ns:'#94A3B8',ip:'#F59E0B',dn:'#22C55E',bl:'#EF4444',rv:'#8B5CF6'}[s]||'#94A3B8';}
function stL(s){return {ns:'Not Started',ip:'In Progress',dn:'Completed',bl:'Blocked',rv:'In Review'}[s]||s;}
function stK(s){return {ns:'s-ns',ip:'s-ip',dn:'s-dn',bl:'s-bl',rv:'s-rv'}[s]||'s-ns';}
function key(ws,ph,l2){return ws+'||'+ph+'||'+l2;}
function getl3(ws,ph,l2){return L3M[ws+'__'+ph+'__'+l2]||[];}
function calcL2Pct(k){
  // L2 progress = average of all L3 task progress values
  const {ws,ph,l2}=parseKey(k);
  const tasks=getl3(ws,ph,l2);
  if(!tasks.length)return 0;
  const t=td(k);
  const total=tasks.reduce((sum,_,i)=>{
    const d=t.l3data&&t.l3data[i];
    return sum+(d&&d.pct!=null?d.pct:(t.l3chk&&t.l3chk[i]?100:0));
  },0);
  return Math.round(total/tasks.length);
}
function calcL2St(k){
  const pct=calcL2Pct(k);
  const t=td(k);
  const {ws,ph,l2}=parseKey(k);
  const tasks=getl3(ws,ph,l2);
  const anyBl=tasks.some((_,i)=>(t.l3data&&t.l3data[i]&&t.l3data[i].st)==='bl');
  if(anyBl)return'bl';
  if(pct===100)return'dn';
  if(pct>0)return'ip';
  return'ns';
}
function l2pct(ws,ph,l2){
  const k=key(ws,ph,l2);
  const pct=calcL2Pct(k);
  const t=td(k);
  return{pct,st:calcL2St(k),ai:t.ai||null};
}
function phPct(ph){let s=0,c=0;WS.forEach(ws=>(L2M[ws+'__'+ph]||[]).forEach(l2=>{s+=l2pct(ws,ph,l2).pct;c++;}));return c?Math.round(s/c):0;}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);}
function loading(on,t){document.getElementById('ovl').classList.toggle('show',on);if(t)document.getElementById('spTx').textContent=t;}
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

/* ══════════════ RENDER ROOT ══════════════ */
function render(){
  if(!CUR||!PROJS[CUR]){
    document.getElementById('lgnd').style.display='none';
    document.getElementById('projBadge').textContent='📁 Select Project';
    document.getElementById('hdrR').innerHTML='';
    renderPicker();
  } else {
    document.getElementById('lgnd').style.display='flex';
    document.getElementById('projBadge').textContent='📁 '+PROJS[CUR].name;
    if(VIEW==='phase'&&ACTIVE_PH){
      document.getElementById('hdrR').innerHTML=`
        <button class="btn btn-back" onclick="backToMatrix()">← Matrix</button>
        <button class="btn btn-g" onclick="exportCSV()">⬇ Export</button>`;
    } else {
      document.getElementById('hdrR').innerHTML=`
        <button class="btn btn-s" onclick="showPicker()">⬡ Projects</button>
        <button class="btn btn-g" onclick="exportCSV()">⬇ Export</button>`;
    }
    if(VIEW==='phase'&&ACTIVE_PH) renderPhaseDetail(ACTIVE_PH);
    else renderMatrix();
  }
}

function backToMatrix(){VIEW='matrix';ACTIVE_PH=null;render();}

/* ══════════════ PICKER ══════════════ */
function renderPicker(){
  const ids=Object.keys(PROJS);
  const list=ids.length
    ?ids.map(id=>`<div class="proj-item" onclick="selProj('${id}')">
        <span class="pi-ico">📋</span><span class="pi-name">${PROJS[id].name}</span>
        <span class="pi-date">${new Date(PROJS[id].created).toLocaleDateString('en-GB')}</span>
        <span class="pi-del" onclick="event.stopPropagation();delProj('${id}')">✕</span>
      </div>`).join('')
    :'<div class="empty-msg">No projects yet. Create your first project above.</div>';
  document.getElementById('main').innerHTML=`<div class="picker-wrap fade">
    <div class="picker-hdr"><div class="picker-title">SAP Activate Projects</div>
    <div class="picker-sub">S/4HANA Cloud Private Edition — Governance &amp; Tracking</div></div>
    <div class="picker-body">
      <div class="sec-lbl">Create New Project</div>
      <div class="new-row">
        <input class="fi" type="text" id="npn" placeholder="e.g. ABC Corp – S/4HANA Cloud" style="flex:1" onkeydown="if(event.key==='Enter')newProj()">
        <button class="btn btn-p" onclick="newProj()">+ Create</button>
      </div>
      ${ids.length?'<div class="sec-lbl">Existing Projects</div>':''}
      <div class="proj-list">${list}</div>
    </div></div>`;
  setTimeout(()=>document.getElementById('npn')?.focus(),100);
}
function newProj(){
  const n=document.getElementById('npn')?.value?.trim();
  if(!n){toast('⚠ Enter a project name');return;}
  const id='p'+Date.now();
  PROJS[id]={id,name:n,created:new Date().toISOString(),tasks:{},delL2:{}};
  save();CUR=id;toast('✅ Created: '+n);render();
}
function selProj(id){CUR=id;render();}
function delProj(id){
  if(!confirm('Delete "'+PROJS[id]?.name+'"?'))return;
  delete PROJS[id];
  if(CUR===id)CUR=Object.keys(PROJS)[0]||null;
  save();render();
}
function showPicker(){CUR=null;render();}

/* ══════════════ MATRIX ══════════════ */
function renderMatrix(){
  const phHdrs=PHASES.map(ph=>`<th class="mxh-ph" style="background:${PH_COLOR[ph]}" onclick="openPhase('${ph}')" title="Click to open ${ph} phase detail">
    <div class="ph-name-big">${ph}</div>
    <div class="ph-click-hint">▼ Open detail</div>
  </th>`).join('');
  const wsRows=WS.map(ws=>{
    const cells=PHASES.map(ph=>{
      const l2s=(L2M[ws+'__'+ph]||[]).filter(l2=>!proj()?.delL2?.[key(ws,ph,l2)]);
      if(!l2s.length)return`<td class="mx-td empty"></td>`;
      const chips=l2s.map(l2=>{
        const p=l2pct(ws,ph,l2);
        let dc=stC(p.st),nc='';
        if(p.ai==='diff'){dc='#F59E0B';nc='cy';}
        if(p.ai==='ok'){dc='#16A34A';nc='cg';}
        const nm=l2.length>36?l2.slice(0,36)+'…':l2;
        return `<div class="chip" onclick="openDrw('${esc(ws)}','${ph}','${esc(l2)}')">
          <div class="cdot" style="background:${dc}"></div>
          <div class="cname ${nc}">${nm}</div>
          <div class="cpct">${p.pct}%</div>
        </div>`;
      }).join('');
      return`<td class="mx-td clickable">${chips}</td>`;
    }).join('');
    return`<tr><td class="mx-ws">${ws}</td>${cells}</tr>`;
  }).join('');
  const phFoot=PHASES.map(ph=>{
    const pct=phPct(ph);const c=PH_COLOR[ph];const qg=PH_QG[ph];
    return`<td class="mxf-ph">
      <div class="ph-pct" style="color:${c}">${pct}%</div>
      <div class="ph-desc" style="color:${c}">${PH_DESC[ph]}</div>
      ${qg?`<div class="ph-qg" style="color:${c}">🏁 ${qg}</div>`:''}
    </td>`;
  }).join('');
  document.getElementById('main').innerHTML=`<div class="mx-outer fade">
    <table class="mx-table">
      <thead><tr><th class="mxh-ws">Workstream</th>${phHdrs}</tr></thead>
      <tbody>${wsRows}</tbody>
      <tfoot><tr class="mx-foot"><td class="mxf-ws">Phase Status</td>${phFoot}</tr></tfoot>
    </table></div>`;
}

function renderPhaseDetail(ph){
  const color=PH_COLOR[ph];
  const pct=phPct(ph);
  const qg=PH_QG[ph]||'';

  // Count totals
  let totalL2=0,totalL3=0,doneL2=0,doneL3=0;
  WS.forEach(ws=>{
    const l2s=L2M[ws+'__'+ph]||[];
    l2s.forEach(l2=>{
      totalL2++;
      const t=td(key(ws,ph,l2));
      if(t.st==='dn')doneL2++;
      const tasks=getl3(ws,ph,l2);
      tasks.forEach((_,i)=>{
        totalL3++;
        if(t.l3chk&&t.l3chk[i])doneL3++;
      });
    });
  });

  const wsSections=WS.map(ws=>{
    const l2s=L2M[ws+'__'+ph]||[];
    if(!l2s.length)return'';
    const wsId='ws_'+ws.replace(/[^a-zA-Z0-9]/g,'_')+'_'+ph;

    const l2blocks=l2s.map(l2=>{
      const k=key(ws,ph,l2);
      const t=td(k);
      const l3list=getl3(ws,ph,l2);
      const l2Id='l2_'+k.replace(/[^a-zA-Z0-9]/g,'_');
      const tip=L2_TIP[l2]||'';

      // L3 task rows — unified state (l3chk), tooltip, progress panel
      const l3rows=l3list.map((task,i)=>{
        const isDone=t.l3chk&&t.l3chk[i];
        const l3tip=L3_TIP[task]||'';
        const pnlId='l3p_ph_'+l2Id+'_'+i;
        const l3d=t.l3data&&t.l3data[i]||{};
        return`<li class="l3-row">
          <div class="l3-chk ${isDone?'done':''}" onclick="toggleL3('${esc(k)}',${i})">${isDone?'✓':''}</div>
          <div class="l3-tip-wrap">
            <span class="l3-text ${isDone?'done':''}">${task}</span>
            ${l3tip?`<div class="l3-tip-popup"><strong>💡 Ne yapılmalı?</strong><br>${l3tip}</div>`:''}
          </div>
          <button class="l3-prog-btn ${l3d.open?'active':''}" onclick="toggleL3Panel('${pnlId}',this)" title="Progress">📊</button>

        </li>`;
      }).join('');

      // L2 status dot — computed from L3 average
      const pctVal=calcL2Pct(k);
      const stVal=calcL2St(k);
      const dotColor=stC(stVal);
      const pctId='mpct_'+l2Id;

      return`<div class="l2-block">
        <div class="l2-header" onclick="toggleL2('${l2Id}')">
          <div class="l2-dot" style="background:${dotColor}"></div>

            <button class="save-mini" onclick="saveL2('${esc(k)}','${l2Id}')">💾 Save</button>

    }).join('');

    // WS level stats
    const wsL2s=l2s.length;
    const wsDone=l2s.filter(l2=>td(key(ws,ph,l2)).st==='dn').length;

    return`<div class="ws-section">
      <div class="ws-header" onclick="toggleWS('${wsId}')">

/* toggle L2 open/close */
function toggleL2(id){
  const el=document.getElementById(id);

/* ══════════════ L3 TASK ACTIONS (Phase Detail) ══════════════ */
function toggleL3(k,i){
  if(!proj())return;
  const t=ensure(k);
  if(!t.l3chk)t.l3chk={};
  t.l3chk[i]=!t.l3chk[i];
  // sync l3data status
  if(!t.l3data)t.l3data={};
  if(!t.l3data[i])t.l3data[i]={};
  t.l3data[i].st=t.l3chk[i]?'dn':'ns';
  if(t.l3chk[i])t.l3data[i].pct=100;
  // recompute L2 pct from l3 checks
  const {ws,ph,l2}=parseKey(k);
  const all=getl3(ws,ph,l2);
  if(all.length){
    const done=all.filter((_,j)=>t.l3chk[j]).length;
    t.pct=Math.round(done/all.length*100);
    t.st=t.pct===100?'dn':t.pct>0?'ip':'ns';
  }
  save();
  renderPhaseDetail(ACTIVE_PH);
}

function updateL2Pct(k,pctId,v){
  const t=ensure(k);if(!t)return;
  t.pct=+v;
  const el=document.getElementById(pctId);
  if(el)el.textContent=v+'%';
  const l2Id='l2_'+k.replace(/[^a-zA-Z0-9]/g,'_');
  const pvEl=document.getElementById('pvd_'+l2Id);
  if(pvEl)pvEl.textContent=v+'%';
  save();
}

function setL2St(k,l2Id,s){
  const t=ensure(k);if(!t)return;
  t.st=s;
  if(s==='dn')t.pct=100;
  save();
  renderPhaseDetail(ACTIVE_PH);
}

function saveL2(k,l2Id){
  const t=ensure(k);if(!t)return;
  const ownEl=document.getElementById('own_'+l2Id);
  const dueEl=document.getElementById('due_'+l2Id);
  if(ownEl)t.owner=ownEl.value;
  if(dueEl)t.due=dueEl.value;
  save();toast('✅ Saved');
}

function parseKey(k){
  const parts=k.split('||');
  return{ws:parts[0],ph:parts[1],l2:parts[2]};
}

/* ══════════════ L3 PANEL HELPERS ══════════════ */
function renderL3Panel(k,i,l3d,pnlId){
  const pct=l3d.pct!=null?l3d.pct:0;
  const st=l3d.st||'ns';
  const owner=l3d.owner||'';
  const due=l3d.due||'';
  const stLbl={ns:'Not Started',ip:'In Progress',dn:'Done',bl:'Blocked'};
  return`<div class="l3-prog-row">
    <span class="l3-prog-lbl">Status</span>
    <div class="l3-st-row">
      ${['ns','ip','dn','bl'].map(s=>`<button class="l3-stb ${s} ${st===s?'act':''}" onclick="setL3St('${esc(k)}',${i},'${s}','${pnlId}')">${{ns:'—',ip:'▶',dn:'✓',bl:'✕'}[s]} ${stLbl[s]}</button>`).join('')}
    </div>
  </div>
  <div class="l3-prog-row">
    <span class="l3-prog-lbl">Progress</span>
    <input type="range" min="0" max="100" value="${pct}" class="l3-mini-sl" oninput="updL3Pct('${esc(k)}',${i},this.value,'${pnlId}')">
    <span class="l3-mini-pv" id="l3pv_${pnlId}">${pct}%</span>
  </div>
  <div class="l3-prog-row">
    <span class="l3-prog-lbl">Owner</span>
    <input class="l3-inp" type="text" placeholder="Owner adı…" value="${esc(owner)}" id="l3own_${pnlId}">
    <input class="l3-inp" type="date" value="${due}" id="l3due_${pnlId}" style="max-width:120px">
    <button class="l3-save" onclick="saveL3('${esc(k)}',${i},'${pnlId}')">💾 Save</button>
  </div>`;
}

function toggleL3Panel(pnlId,btn){
  const el=document.getElementById(pnlId);
  if(!el)return;
  el.classList.toggle('open');
  btn.classList.toggle('active');
}

function setL3St(k,i,s,pnlId){
  const t=ensure(k);if(!t)return;
  if(!t.l3data)t.l3data={};
  if(!t.l3data[i])t.l3data[i]={};
  t.l3data[i].st=s;
  t.l3data[i].manuallySet=true;  // flag: user has manually set this
  if(s==='dn'){t.l3data[i].pct=100;if(!t.l3chk)t.l3chk={};t.l3chk[i]=true;}
  else if(s==='ns'){t.l3data[i].pct=0;if(t.l3chk)t.l3chk[i]=false;}
  _syncL2(k);
  save();
  const el=document.getElementById(pnlId);
  if(el)el.innerHTML=renderL3Panel(k,i,t.l3data[i],pnlId);
  _updateL2Badge(k);
}

function updL3Pct(k,i,v,pnlId){
  const t=ensure(k);if(!t)return;
  if(!t.l3data)t.l3data={};
  if(!t.l3data[i])t.l3data[i]={};
  t.l3data[i].pct=+v;
  t.l3data[i].manuallySet=true;  // flag: user has manually set this
  if(+v===100){t.l3data[i].st='dn';if(!t.l3chk)t.l3chk={};t.l3chk[i]=true;}
  else if(+v===0){t.l3data[i].st='ns';if(t.l3chk)t.l3chk[i]=false;}
  else{t.l3data[i].st='ip';}
  _syncL2(k);
  save();
  const pvEl=document.getElementById('l3pv_'+pnlId);
  if(pvEl)pvEl.textContent=v+'%';
  _updateL2Badge(k);
}

  const t=ensure(k);if(!t)return;
  if(!t.l3data)t.l3data={};
  if(!t.l3data[i])t.l3data[i]={};
  const ownEl=document.getElementById('l3own_'+pnlId);
  const dueEl=document.getElementById('l3due_'+pnlId);
  if(ownEl)t.l3data[i].owner=ownEl.value;

}

function renderTasks(ws,ph,l2,k,t){

  const tip=L2_TIP[l2]||'';

  const st=calcL2St(k);
  const items=all.map((tx,i)=>{

    const pnlId='l3p_drw_'+safeK+'_'+i;

    if(isDel)return`<li class="l3-item">

      </div>
      <button class="l3-prog-btn ${l3d.open?'active':''}" onclick="toggleL3Panel('${pnlId}',this)" title="Progress">📊</button>
      <span class="rm-btn" onclick="removeT('${esc(k)}',${i})" title="Remove">✕</span>
      <div class="l3-prog-panel ${l3d.open?'open':''}" id="${pnlId}" style="width:100%;margin-left:0;margin-top:4px">

      <span style="margin-left:auto;font-size:11px;font-family:var(--mo);font-weight:700;color:${PH_COLOR[ph]||'#1D4ED8'}"

/* L3 template actions */
async function upL3Tpl(inp,k,i){
  const f=inp.files[0];if(!f)return;
  const tplKey=k+'||'+i;
  try{
    // Store file info (name + size) — for non-spreadsheet files we store metadata only
    const isSheet=/\.(xlsx|xls|csv)$/i.test(f.name);
    let data=null;
    if(isSheet) data=await readXL(f);
    if(!CF[tplKey])CF[tplKey]={};
    CF[tplKey].tpl={name:f.name,size:f.size,type:f.type,data,isSheet};
    toast('✅ '+f.name+' loaded');
    renderDrwBody();
  }catch(e){toast('❌ Could not load file: '+e.message);}
}

function clearL3Tpl(k,i){
  const tplKey=k+'||'+i;
  if(CF[tplKey])delete CF[tplKey].tpl;
  renderDrwBody();
}

function previewL3Tpl(k,i){
  const tplKey=k+'||'+i;
  const tpl=CF[tplKey]?.tpl;
  if(!tpl)return;
  if(!tpl.isSheet||!tpl.data){
    toast('ℹ Preview not available for this file type');return;
  }
  // Show first sheet in a simple modal
  const firstSheet=Object.keys(tpl.data)[0];
  const rows=tpl.data[firstSheet].slice(0,20);
  const html=rows.map(r=>`<tr>${r.map(c=>`<td style="padding:4px 8px;border:1px solid #e2e8f0;font-size:10px;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis">${c}</td>`).join('')}</tr>`).join('');
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML=`<div style="background:#fff;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.3);max-width:90vw;max-height:80vh;overflow:auto;padding:20px">
    <div style="display:flex;align-items:center;margin-bottom:12px">
      <strong style="font-size:13px">${tpl.name}</strong>
      <span style="font-size:10px;color:#94a3b8;margin-left:8px">Sheet: ${firstSheet} (first 20 rows)</span>
      <button onclick="this.closest('div[style*=fixed]').remove()" style="margin-left:auto;border:none;background:#f1f5f9;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px">✕ Close</button>
    </div>
    <div style="overflow:auto"><table style="border-collapse:collapse">${html}</table></div>
  </div>`;
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  document.body.appendChild(modal);
}

/* ══════════════ TASK ACTIONS ══════════════ */
function ensure(k){
  if(!proj())return null;
  if(!proj().tasks)proj().tasks={};
  if(!proj().tasks[k])proj().tasks[k]={st:'ns',pct:0,notes:'',owner:'',due:'',chk:{},del:{},extra:[],l3chk:{},l3owner:{},l3data:{},ai:null,air:null};
  // migrate old chk → l3chk
  const t=proj().tasks[k];
  if(t.chk&&Object.keys(t.chk).length&&(!t.l3chk||!Object.keys(t.l3chk).length)){t.l3chk=t.chk;}
  return t;
}
function toggleChk(k,i){
  const t=ensure(k);if(!t)return;
  if(!t.l3chk)t.l3chk={};
  t.l3chk[i]=!t.l3chk[i];
  const done=t.l3chk[i];
  // Only sync pct/st in l3data if panel hasn't been touched — don't override manual progress entries
  if(!t.l3data)t.l3data={};
  if(!t.l3data[i])t.l3data[i]={};
  // Only auto-set if user hasn't manually entered a progress value
  const hasManualProgress = t.l3data[i].manuallySet;
  if(!hasManualProgress){
    t.l3data[i].pct = done ? 100 : 0;
    t.l3data[i].st  = done ? 'dn' : 'ns';
  }
  _syncL2(k);
  save();
  // In-place DOM update — no page reload, no scroll jump
  const safeK=k.replace(/[^a-zA-Z0-9]/g,'_');
  const chkEl=document.getElementById('chk_'+safeK+'_'+i);
  const txtEl=document.getElementById('txt_'+safeK+'_'+i);
  if(chkEl){chkEl.className='chk'+(done?' dn':'');chkEl.textContent=done?'✓':'';}
  if(txtEl){txtEl.className='task-txt'+(done?' done':'');}
  _updateL2Badge(k);
  const pct=calcL2Pct(k);const st=calcL2St(k);
  const hPctEl=document.getElementById('drw_pct_'+safeK);
  if(hPctEl)hPctEl.textContent=pct+'%';
  const hStEl=document.getElementById('drw_st_'+safeK);
  if(hStEl){hStEl.className='sb '+stK(st);hStEl.textContent=stL(st);}
}

function closeDrawer(){
  document.getElementById('drwBg').classList.remove('show');
  document.getElementById('drw').classList.remove('open');
  // Refresh matrix/phase in background without scroll jump
  if(VIEW==='matrix') renderMatrix();
  else renderPhaseDetail(ACTIVE_PH);
}
function removeT(k,i){const t=ensure(k);if(!t)return;if(!t.del)t.del={};t.del[i]=true;save();renderDrwBody();}
function restoreT(k,i){const t=ensure(k);if(!t)return;if(t.del)delete t.del[i];save();renderDrwBody();}
function addT(k){
  const fk=k.replace(/[\|]/g,'_');
  const inp=document.getElementById('nt_'+fk);
  const txt=inp?.value?.trim();
  if(!txt){toast('⚠ Enter task description');return;}
  const t=ensure(k);if(!t)return;
  if(!t.extra)t.extra=[];
  t.extra.push(txt);
  save();inp.value='';renderDrwBody();toast('✅ Task added');
}
function setSt(k,s){const t=ensure(k);if(!t)return;t.st=s;save();renderDrw();}
function slPct(k,v){
  const t=ensure(k);if(!t)return;t.pct=+v;
  const el=document.getElementById('pv_'+k.replace(/[\|]/g,'_'));
  if(el)el.textContent=v+'%';
  save();

function setF(k,f,v){const t=ensure(k);if(!t)return;t[f]=v;}

/* FILE UPLOAD */
function trigU(id){document.getElementById(id)?.click();}
async function upFile(inp,k,type){
  const f=inp.files[0];if(!f)return;
  try{
    const d=await readXL(f);
    if(!CF[k])CF[k]={};
    CF[k][type]={name:f.name,data:d};
    toast('✅ '+f.name+' loaded');renderDrwBody();
  }catch(e){toast('❌ Could not read file');}
}
function clearF(k,type){if(CF[k])delete CF[k][type];renderDrwBody();}
function readXL(f){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const o={};wb.SheetNames.forEach(s=>{o[s]=XLSX.utils.sheet_to_json(wb.Sheets[s],{header:1,defval:'',raw:false});});
      res(o);
    }catch(err){rej(err);}};
    r.onerror=rej;r.readAsBinaryString(f);
  });
}
function x2txt(d){
  return Object.entries(d).map(([s,rows])=>'=== Sheet: '+s+' ===\n'+rows.slice(0,80).map(r=>r.join(' | ')).join('\n')).join('\n\n');
}

function buildReport(r){
  const sc=r.overall_score||0;const sc2=sc>=80?'#16A34A':sc>=60?'#D97706':'#DC2626';
  function sec(items,hc,bc,em,ttl){
    if(!items?.length)return'';
    return'<div class="qa-sec"><div class="qa-hdr '+hc+'">'+em+' '+ttl+' ('+items.length+')</div>'+items.map(i=>'<div class="qa-it" style="border-left-color:'+bc+'">'+i+'</div>').join('')+'</div>';
  }
  return'<div class="score-row"><div class="score-num" style="color:'+sc2+'">'+sc+'%</div><div><div class="score-lbl">QA Compliance Score</div><div class="score-txt">'+r.summary+'</div></div></div>'+
    sec(r.critical_gaps,'qa-cr','#DC2626','🔴','Critical Gaps')+sec(r.overdue_risks,'qa-od','#D97706','⏰','Overdue / At-Risk')+
    sec(r.missing_items,'qa-ms','#1D4ED8','📋','Missing Items')+sec(r.differences,'qa-df','#92400E','⚠️','Content Differences')+
    sec(r.positives,'qa-ok','#16A34A','✅','Positives')+sec(r.recommendations,'qa-ok','#16A34A','💡','Recommendations');
}
