<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SAP Activate | Governance Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F0F2F7;--surface:#fff;--sf2:#F8F9FC;--bd:#E2E6EF;
  --tx:#0F172A;--tx2:#475569;--tx3:#94A3B8;--navy:#0F172A;
  --r:10px;--rs:6px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --sh2:0 4px 24px rgba(0,0,0,.14);
  --fn:'Lexend',sans-serif;--mo:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5;}

/* HEADER */
.hdr{background:var(--navy);color:#fff;height:54px;display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.logo{font-size:15px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:6px;}
.logo-sap{color:#F0AB00;}
.logo-div{width:1px;height:18px;background:rgba(255,255,255,.2);}
.logo-sub{font-size:12px;font-weight:400;color:rgba(255,255,255,.5);}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.pchip{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;color:#fff;white-space:nowrap;}
.pchip:hover{opacity:.8;}

/* LEGEND */
.lgnd{background:var(--surface);border-bottom:1px solid var(--bd);padding:6px 20px;display:flex;align-items:center;gap:16px;font-size:11px;}
.li{display:flex;align-items:center;gap:5px;color:var(--tx2);}
.ldot{width:10px;height:10px;border-radius:50%;}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--bd);padding:0 20px;display:flex;align-items:center;height:42px;}
.bc{display:flex;align-items:center;gap:6px;font-size:12px;}
.bcl{color:#1D4ED8;cursor:pointer;font-weight:500;}.bcl:hover{text-decoration:underline;}
.bcs{color:var(--tx3);}
.bcc{color:var(--tx2);font-weight:500;}
.nav-r{margin-left:auto;display:flex;gap:8px;}

/* BUTTONS */
.btn{padding:6px 14px;border-radius:var(--rs);font-size:12px;font-weight:600;font-family:var(--fn);cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-p{background:#1D4ED8;color:#fff;}.btn-p:hover{background:#1e40af;}
.btn-s{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd);}.btn-s:hover{background:var(--bd);}
.btn-g{background:#F0AB00;color:var(--navy);}.btn-g:hover{background:#d99e00;}
.btn-ok{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;}
.btn-w{width:100%;justify-content:center;}

/* MAIN */
.main{padding:18px 20px;}

/* SUMMARY */
.srow{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px;}
.scard{background:var(--surface);border-radius:var(--r);padding:13px 14px;box-shadow:var(--sh);border-top:3px solid;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.scard:hover{transform:translateY(-2px);box-shadow:var(--sh2);}
.sc-ph{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.sc-pct{font-size:24px;font-weight:800;font-family:var(--mo);line-height:1.1;}
.sc-mt{font-size:10px;color:var(--tx3);margin-top:2px;}
.sc-bar{margin-top:8px;height:4px;border-radius:2px;background:var(--bg);overflow:hidden;}
.sc-fill{height:100%;border-radius:2px;transition:width .5s;}

/* MATRIX */
.mx{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.mxh{display:grid;grid-template-columns:200px repeat(6,1fr);border-bottom:2px solid var(--bd);}
.mhc{padding:10px 14px;font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;border-right:1px solid var(--bd);background:var(--sf2);display:flex;align-items:center;}
.mhp{padding:10px;text-align:center;cursor:pointer;border-right:1px solid rgba(255,255,255,.15);}
.mhp:last-child{border-right:none;}
.mhp:hover{filter:brightness(1.1);}
.mhpn{font-size:13px;font-weight:800;color:#fff;}
.mhpd{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;}
.qgt{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,.18);padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;color:#fff;margin-top:5px;border:1px solid rgba(255,255,255,.25);}
.mxr{display:grid;grid-template-columns:200px repeat(6,1fr);border-bottom:1px solid var(--bd);}
.mxr:last-child{border-bottom:none;}
.wsl{padding:8px 14px;border-right:1px solid var(--bd);background:var(--sf2);display:flex;align-items:center;gap:7px;font-size:11px;font-weight:500;}
.wsi{font-size:13px;}
.mc{padding:7px 8px;border-right:1px solid var(--bd);cursor:pointer;transition:background .12s;min-height:62px;position:relative;}
.mc:last-child{border-right:none;}
.mc:hover{background:#F1F5FF;}
.mc.emp{cursor:default;background:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(0,0,0,.012) 5px,rgba(0,0,0,.012) 10px);}
.mc.emp:hover{background:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(0,0,0,.012) 5px,rgba(0,0,0,.012) 10px);}
.cis{display:flex;flex-direction:column;gap:2px;}
.ci{display:flex;align-items:center;gap:4px;font-size:10px;line-height:1.3;}
.cin{color:var(--tx2);}
.ciy{color:#92400E;font-weight:600;}
.cig{color:#14532D;font-weight:600;}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.cm{font-size:9px;color:var(--tx3);margin-top:1px;}
.cpct{position:absolute;bottom:4px;right:6px;font-size:9px;font-family:var(--mo);color:var(--tx3);}
.cpb{position:absolute;bottom:0;left:0;right:0;height:3px;}
.cpbf{height:100%;transition:width .3s;}

/* DETAIL */
.dtl{display:grid;grid-template-columns:260px 1fr;gap:14px;}
.dpl{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;}
.dvp{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column;}
.dvph{padding:12px 14px;border-bottom:1px solid var(--bd);background:var(--sf2);display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;}
.dvpbg{background:var(--navy);color:#fff;padding:2px 7px;border-radius:10px;font-size:10px;font-family:var(--mo);}
.di{padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;}
.di:hover{background:var(--sf2);}
.di.sel{background:#EFF6FF;border-left:3px solid #1D4ED8;padding-left:11px;}
.di:last-child{border-bottom:none;}
.din{font-size:11px;font-weight:500;margin-bottom:5px;line-height:1.4;}
.din.hy{color:#92400E;}.din.hg{color:#14532D;}
.dir{display:flex;align-items:center;gap:7px;}
.dib{flex:1;height:3px;background:var(--bg);border-radius:2px;overflow:hidden;}
.dibf{height:100%;border-radius:2px;}
.din2{font-size:10px;font-family:var(--mo);color:var(--tx3);min-width:26px;text-align:right;}

/* RIGHT PANEL */
.rp{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden;}
.rpe{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--tx3);font-size:12px;}
.rph{padding:14px 18px;border-bottom:1px solid var(--bd);background:var(--sf2);}
.rphn{font-size:13px;font-weight:700;margin-bottom:6px;}
.rphm{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--sf2);}
.tab{padding:9px 15px;font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--tx2);transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--tx);}
.tab.act{color:#1D4ED8;border-bottom-color:#1D4ED8;background:var(--surface);}
.tc{padding:18px;overflow-y:auto;flex:1;max-height:calc(100vh - 290px);}

/* STATUS BADGES */
.sb{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
.sns{background:#F1F5F9;color:#64748B;}
.sip{background:#FEF3C7;color:#D97706;}
.sdn{background:#DCFCE7;color:#16A34A;}
.sbl{background:#FEE2E2;color:#DC2626;}
.srv{background:#EDE9FE;color:#7C3AED;}
.sdf{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;}
.sap{background:#DCFCE7;color:#14532D;border:1px solid #BBF7D0;}

/* TASKS */
.stt{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);margin-bottom:10px;}
.tl{list-style:none;}
.ti{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:12px;}
.ti:last-child{border-bottom:none;}
.tck{width:15px;height:15px;border:1.5px solid var(--bd);border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:9px;}
.tck.dn{background:#22C55E;border-color:#22C55E;color:#fff;}
.tsd{text-decoration:line-through;color:var(--tx3);}

/* PROGRESS */
.str{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.sbn{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;font-family:var(--fn);transition:all .15s;}
.sbns{background:#F1F5F9;color:var(--tx2);border-color:var(--bd);}
.sbip{background:#FEF3C7;color:#D97706;border-color:#F59E0B;}
.sbdn{background:#DCFCE7;color:#16A34A;border-color:#22C55E;}
.sbbl{background:#FEE2E2;color:#DC2626;border-color:#EF4444;}
.sbrv{background:#EDE9FE;color:#7C3AED;border-color:#8B5CF6;}
.sbn.act{box-shadow:0 0 0 2px currentColor;}
.slr{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.psl{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--bg);outline:none;}
.psl::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#1D4ED8;cursor:pointer;}
.pv{font-family:var(--mo);font-size:13px;font-weight:600;width:38px;text-align:right;}
.ff{margin-bottom:11px;}
.fl{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px;display:block;}
.fi,.fta{width:100%;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--rs);font-family:var(--fn);font-size:12px;background:var(--surface);color:var(--tx);outline:none;transition:border-color .15s;}
.fi:focus,.fta:focus{border-color:#1D4ED8;}
.fta{resize:vertical;min-height:72px;}

/* BEST PRACTICE */
.bph{background:linear-gradient(135deg,#0F172A,#1D4ED8);border-radius:var(--rs);padding:14px 16px;margin-bottom:14px;color:#fff;}
.bpht{font-size:13px;font-weight:700;margin-bottom:4px;}
.bphs{font-size:11px;color:rgba(255,255,255,.65);}
.bpfc{border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden;margin-bottom:12px;}
.bpfh{padding:10px 13px;background:var(--sf2);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bd);}
.bpfi{font-size:16px;}
.bpfn{font-size:12px;font-weight:600;flex:1;}
.bpft{font-size:10px;padding:2px 6px;border-radius:4px;background:#EFF6FF;color:#1D4ED8;font-weight:600;}
.bpfb{padding:13px;}
.bps{margin-bottom:12px;}
.bpst{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#1D4ED8;margin-bottom:7px;}
.bpcl{list-style:none;}
.bpci{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid var(--bd);font-size:11px;color:var(--tx2);}
.bpci:last-child{border-bottom:none;}
.bpico{color:#1D4ED8;flex-shrink:0;margin-top:1px;}
.bptb{width:100%;border-collapse:collapse;font-size:11px;}
.bptb th{background:var(--sf2);padding:6px 8px;text-align:left;font-weight:600;border:1px solid var(--bd);color:var(--tx2);}
.bptb td{padding:5px 8px;border:1px solid var(--bd);color:var(--tx2);}

/* AI COMPARE */
.upz{border:2px dashed var(--bd);border-radius:var(--r);padding:18px 12px;text-align:center;cursor:pointer;transition:all .2s;background:var(--sf2);}
.upz:hover{border-color:#1D4ED8;background:#EFF6FF;}
.upz.ld{border-color:#22C55E;background:#F0FDF4;}
.uzi{font-size:22px;margin-bottom:5px;}
.uzn{font-size:11px;font-weight:500;color:var(--tx2);}
.uzs{font-size:10px;color:var(--tx3);margin-top:3px;}
.bppl{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border:1px solid #BFDBFE;border-radius:var(--r);padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.bppi{font-size:20px;}
.bppt{font-size:11px;font-weight:500;color:#1D4ED8;}
.bpps{font-size:10px;color:#2563EB;margin-top:2px;}
.aisr{display:flex;align-items:center;gap:12px;background:var(--sf2);border-radius:var(--rs);padding:12px;margin-bottom:12px;}
.aisn{font-size:32px;font-weight:800;font-family:var(--mo);}
.aisl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);}
.aist{font-size:11px;color:var(--tx2);margin-top:3px;}
.gps{margin-bottom:13px;}
.gph{font-size:11px;font-weight:700;padding:5px 9px;border-radius:var(--rs);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.gc{background:#FEE2E2;color:#DC2626;}
.gw{background:#FEF3C7;color:#D97706;}
.gi{background:#DBEAFE;color:#1D4ED8;}
.gk{background:#DCFCE7;color:#16A34A;}
.gpi{padding:7px 10px;border-left:3px solid;background:var(--sf2);margin-bottom:3px;border-radius:0 var(--rs) var(--rs) 0;font-size:11px;line-height:1.4;}

/* BANNERS */
.bnry{background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--rs);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.bnrg{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:var(--rs);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.bni{font-size:18px;}
.bnt{font-size:11px;font-weight:600;flex:1;}
.bns{font-size:10px;margin-top:2px;font-weight:400;}

/* OVERLAY + TOAST */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:1000;}
.ovl.show{display:flex;}
.spc{background:var(--surface);border-radius:var(--r);padding:24px 32px;text-align:center;box-shadow:var(--sh2);}
.spn{width:34px;height:34px;border:3px solid var(--bg);border-top-color:#1D4ED8;border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.sptx{font-size:12px;color:var(--tx2);font-weight:500;}
.tst{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:9px 16px;border-radius:var(--r);font-size:12px;box-shadow:var(--sh2);transform:translateY(50px);opacity:0;transition:all .25s;z-index:300;}
.tst.show{transform:translateY(0);opacity:1;}

/* UTILS */
.hidden{display:none!important;}
.fade{animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}
.txm{color:var(--tx3);}
.txs{font-size:12px;}
.mt2{margin-top:8px;}.mt3{margin-top:12px;}
.row{display:flex;align-items:center;gap:8px;}
@media(max-width:1100px){.mx{overflow-x:auto;}.mxh,.mxr{min-width:950px;}}
</style>
</head>
<body>
<div class="ovl" id="ovl"><div class="spc"><div class="spn"></div><div class="sptx" id="spTx">AI analizi çalışıyor…</div></div></div>
<div class="tst" id="tst"></div>

<header class="hdr">
  <div class="logo"><span class="logo-sap">SAP</span> Activate<div class="logo-div"></div><span class="logo-sub">Governance Tool</span></div>
  <span style="font-size:11px;color:rgba(255,255,255,.4)">S/4HANA Cloud Private Edition</span>
  <div class="hdr-r"><div id="hChips" style="display:flex;gap:5px"></div><button class="btn btn-g" onclick="goXl()">🤖 AI Compare</button></div>
</header>

<div class="lgnd">
  <span style="font-size:11px;font-weight:600;color:var(--tx2)">Renk Kodu:</span>
  <div class="li"><div class="ldot" style="background:#94A3B8"></div>Normal</div>
  <div class="li"><div class="ldot" style="background:#F59E0B"></div><strong style="color:#92400E">🟡 Sarı</strong>: AI fark tespit etti — inceleme bekliyor</div>
  <div class="li"><div class="ldot" style="background:#16A34A"></div><strong style="color:#14532D">🟢 Yeşil</strong>: Onaylandı — tamamlandı</div>
</div>

<div class="nav"><div class="bc" id="bc"></div><div class="nav-r" id="navR"></div></div>
<div class="main fade" id="main"></div>

<script>

      ],
      statusOpts:['open','in preparation','delivered']

function phPct(ph){let t=0,c=0;WS.forEach(ws=>cD(ph,ws.id).forEach(d=>{t+=gP(d.id).pct||0;c++;}));return c?Math.round(t/c):0;}
function toast(m){const e=document.getElementById('tst');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2400);}
function load2(on,t='AI analizi çalışıyor…'){document.getElementById('ovl').classList.toggle('show',on);document.getElementById('spTx').textContent=t;}

/* ══ RENDER ══ */
function render(){
  rChips();rNav();
  const m=document.getElementById('main');m.className='main fade';
  if(S.view==='dash')m.innerHTML=rDash();
  else if(S.view==='cell')m.innerHTML=rCell();
  else if(S.view==='xl')m.innerHTML=rXL();
}
function rChips(){document.getElementById('hChips').innerHTML=PH.map(p=>`<span class="pchip" style="background:${p.color}" onclick="gPh('${p.id}')">${p.name} ${phPct(p.id)}%</span>`).join('');}
function rNav(){
  const bc=document.getElementById('bc'),nr=document.getElementById('navR');
  if(S.view==='dash'){bc.innerHTML=`<span class="bcc">📊 Dashboard</span>`;nr.innerHTML=`<span class="txs txm">${allD().length} deliverable</span>`;}
  else if(S.view==='cell'){const ph=PH.find(p=>p.id===S.cell.ph),ws=WS.find(w=>w.id===S.cell.ws);bc.innerHTML=`<span class="bcl" onclick="gDash()">Dashboard</span><span class="bcs">›</span><span style="color:${ph.color};font-weight:600">${ph.name}</span><span class="bcs">›</span><span class="bcc">${ws.name}</span>`;nr.innerHTML=`<button class="btn btn-s" onclick="gDash()">← Geri</button>`;}
  else if(S.view==='xl'){bc.innerHTML=`<span class="bcl" onclick="gDash()">Dashboard</span><span class="bcs">›</span><span class="bcc">🤖 AI Compare</span>`;nr.innerHTML=`<button class="btn btn-s" onclick="gDash()">← Geri</button>`;}
}

/* DASHBOARD */
function rDash(){
  const cards=PH.map(p=>{const pct=phPct(p.id);const cnt=WS.reduce((s,ws)=>s+cD(p.id,ws.id).length,0);
    return `<div class="scard" style="border-top-color:${p.color};color:${p.color}" onclick="gPh('${p.id}')">
      <div class="sc-ph">${p.name}</div><div class="sc-pct">${pct}%</div>
      <div class="sc-mt">${cnt} deliverable</div>
      <div class="sc-bar"><div class="sc-fill" style="width:${pct}%;background:${p.color}"></div></div>
    </div>`;}).join('');
  const hdr=`<div class="mxh"><div class="mhc">Workstream</div>${PH.map(p=>
    `<div class="mhp" style="background:${p.color}" onclick="gPh('${p.id}')">
      <div class="mhpn">${p.name}</div><div class="mhpd">${p.desc}</div>
      ${p.qg?`<div><span class="qgt">🏁 ${p.qg}</span></div>`:''}
    </div>`).join('')}</div>`;
  const rows=WS.map(ws=>{
    const cells=PH.map(ph=>{
      const ds=cD(ph.id,ws.id);if(!ds.length) return`<div class="mc emp"></div>`;
      const pct=Math.round(ds.reduce((s,d)=>s+(gP(d.id).pct||0),0)/ds.length);
      const items=ds.slice(0,3).map(d=>{
        const p=gP(d.id);const ai=p.ai;
        let cls='cin',dot=stC(p.st);
        if(ai==='diff'){cls='ciy';dot='#F59E0B';}
        if(ai==='ok'){cls='cig';dot='#16A34A';}
        const fl=ai==='diff'?'🟡':ai==='ok'?'🟢':'';
        return `<div class="ci ${cls}"><div class="cdot" style="background:${dot}"></div>${fl}${d.name.length>34?d.name.slice(0,34)+'…':d.name}</div>`;
      }).join('');
      const more=ds.length>3?`<div class="cm">+${ds.length-3} daha</div>`:'';
      return `<div class="mc" onclick="oCell('${ph.id}','${ws.id}')">
        <div class="cis">${items}${more}</div>
        <div class="cpct">${pct}%</div>
        <div class="cpb"><div class="cpbf" style="width:${pct}%;background:${ph.color}"></div></div>
      </div>`;
    }).join('');
    return `<div class="mxr"><div class="wsl"><span class="wsi">${ws.icon}</span>${ws.name}</div>${cells}</div>`;
  }).join('');
  return `<div class="srow">${cards}</div><div class="mx">${hdr}<div>${rows}</div></div>`;
}

/* CELL VIEW */
function rCell(){
  const{ph,ws}=S.cell;const phase=PH.find(p=>p.id===ph),wss=WS.find(w=>w.id===ws);const ds=cD(ph,ws);
  const list=ds.map(d=>{
    const p=gP(d.id);const sel=S.dId===d.id;const ai=p.ai;
    let nc='din',fl='';if(ai==='diff'){nc='din hy';fl=' 🟡';}if(ai==='ok'){nc='din hg';fl=' 🟢';}
    const bpt=d.hasBP?`<span style="font-size:9px;background:#EFF6FF;color:#1D4ED8;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:4px">BP</span>`:'';
    return `<div class="di ${sel?'sel':''}" onclick="sDel('${d.id}')">
      <div class="${nc}">${d.name}${fl}${bpt}</div>
      <div class="dir"><span class="sb ${stCl(p.st)}">${stL(p.st)}</span>
        <div class="dib"><div class="dibf" style="width:${p.pct}%;background:${phase.color}"></div></div>
        <span class="din2">${p.pct}%</span>
      </div>
    </div>`;}).join('');
  const rp=S.dId?rRight():`<div class="rp"><div class="rpe">← Bir deliverable seçin</div></div>`;
  return `<div class="row" style="margin-bottom:14px">
    <span class="dpl" style="background:${phase.color}">${phase.name}</span>
    <span style="font-size:13px;font-weight:600">${wss.icon} ${wss.name}</span>
    <span class="txs txm" style="margin-left:auto">${ds.length} deliverable</span>
  </div>
  <div class="dtl"><div class="dvp"><div class="dvph">Deliverables <span class="dvpbg">${ds.length}</span></div>${list}</div>${rp}</div>`;
}
function rRight(){
  const d=fD(S.dId);if(!d) return '';const p=gP(S.dId);
  const tabs=['tasks','progress','bp','ai'].map(t=>{
    const lbl={tasks:'📋 Görevler',progress:'📊 İlerleme',bp:'⭐ Best Practice',ai:'🤖 AI Compare'}[t];
    if(t==='bp'&&!d.hasBP) return '';
    return `<div class="tab ${S.tab===t?'act':''}" onclick="sTab('${t}')">${lbl}</div>`;
  }).filter(Boolean).join('');
  return `<div class="rp">
    <div class="rph">
      <div class="rphn">${d.name}</div>
      <div class="rphm">
        <span class="sb ${stCl(p.st)}">${stL(p.st)}</span>
        <span class="txm" style="font-size:10px;font-family:var(--mo)">${p.pct}%</span>
        ${d.hasBP?'<span style="font-size:10px;background:#EFF6FF;color:#1D4ED8;padding:2px 7px;border-radius:4px;font-weight:600">⭐ Best Practice</span>':''}
        ${d.tpl?'<span style="font-size:10px;background:#F0FDF4;color:#16A34A;padding:2px 7px;border-radius:4px;font-weight:600">📋 Şablon</span>':''}
        ${p.ai==='diff'?'<span class="sb sdf">🟡 Fark Tespit Edildi</span>':''}
        ${p.ai==='ok'?'<span class="sb sap">🟢 Onaylandı</span>':''}
      </div>
    </div>
    <div class="tabs">${tabs}</div>
    <div class="tc">${rTab(d,p)}</div>
  </div>`;
}
function rTab(d,p){
  if(S.tab==='tasks'){
    const dn=Object.values(p.chk||{}).filter(Boolean).length;
    const items=d.tasks.map((t,i)=>{const c=p.chk?.[i];return`<li class="ti"><div class="tck ${c?'dn':''}" onclick="tTask('${d.id}',${i})">${c?'✓':''}</div><span class="${c?'tsd':''}">${t}</span></li>`;}).join('');
    return `<div class="stt">Görevler (${dn}/${d.tasks.length})</div><ul class="tl">${items}</ul>`;
  }
  if(S.tab==='progress'){
    const ss=[['ns','sbns'],['ip','sbip'],['dn','sbdn'],['bl','sbbl'],['rv','sbrv']];
    return `<div class="stt">Durum</div>
      <div class="str">${ss.map(([s,c])=>`<button class="sbn ${c} ${p.st===s?'act':''}" onclick="sSt('${d.id}','${s}')">${stL(s)}</button>`).join('')}</div>
      <div class="stt">Tamamlanma %</div>
      <div class="slr"><input type="range" min="0" max="100" value="${p.pct}" class="psl" oninput="sPct('${d.id}',this.value)"><span class="pv" id="pv_${d.id}">${p.pct}%</span></div>
      <div class="ff"><label class="fl">Sorumlu</label><input class="fi" type="text" value="${p.who||''}" placeholder="Ad Soyad" oninput="sF('${d.id}','who',this.value)"></div>
      <div class="ff"><label class="fl">Bitiş Tarihi</label><input class="fi" type="date" value="${p.due||''}" oninput="sF('${d.id}','due',this.value)"></div>
      <div class="ff"><label class="fl">Notlar</label><textarea class="fta" placeholder="Notlar…" oninput="sF('${d.id}','notes',this.value)">${p.notes||''}</textarea></div>
      <button class="btn btn-p btn-w" onclick="svP('${d.id}')">💾 Kaydet</button>`;
  }
  if(S.tab==='bp') return rBP(d);
  if(S.tab==='ai') return rAI(d,p);
  const items=d.acc.map(a=>`<div style="display:flex;align-items:center;gap:7px;padding:9px 11px;border:1px solid var(--bd);border-radius:var(--rs);font-size:11px;background:var(--surface);margin-bottom:5px">${tiI(a.t)} <span style="font-weight:500;flex:1">${a.n}</span><span style="font-size:10px;padding:1px 5px;border-radius:4px;background:var(--sf2);color:var(--tx3)">${a.t}</span></div>`).join('');
  return `<div class="stt">Accelerators (${d.acc.length})</div>${items}`;
}

/* BEST PRACTICE TAB */
function rBP(d){
  const bpd=BP[d.id];if(!bpd) return `<div class="rpe">Best Practice içeriği yüklenmedi.</div>`;
  const fh=bpd.files.map(f=>{
    let body=`<div style="font-size:10px;color:var(--tx3);margin-bottom:10px">Kaynak: ${f.source}</div>`;
    if(f.summary) body+=`<div class="bps"><div class="bpst">📌 Özet</div><p style="font-size:11px;color:var(--tx2);line-height:1.6">${f.summary}</p></div>`;
    if(f.sections) f.sections.forEach(s=>{body+=`<div class="bps"><div class="bpst">📋 ${s.title}</div><ul class="bpcl">${s.items.map(i=>`<li class="bpci"><span class="bpico">▸</span><span>${i}</span></li>`).join('')}</ul></div>`;});
    if(f.tableHeaders){const th=f.tableHeaders.map(h=>`<th>${h}</th>`).join('');const tr=f.tableRows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');body+=`<div class="bps"><div class="bpst">📊 Şablon Yapısı</div><div style="overflow-x:auto"><table class="bptb"><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table></div></div>`;if(f.statusOpts) body+=`<div style="margin-top:8px;font-size:11px;color:var(--tx2)"><strong>Durum değerleri:</strong> ${f.statusOpts.join(' → ')}</div>`;}
    return `<div class="bpfc"><div class="bpfh"><span class="bpfi">${f.icon}</span><span class="bpfn">${f.name}</span><span class="bpft">${f.type}</span></div><div class="bpfb">${body}</div></div>`;
  }).join('');
  return `<div class="bph"><div class="bpht">⭐ Best Practice Referansları</div><div class="bphs">SAP Activate metodolojisinden alınan resmi içerikler. AI karşılaştırmasında otomatik kullanılır.</div></div>${fh}`;
}

/* AI TAB */
function rAI(d,p){
  const hasBP=d.hasBP;const con=S.files[d.id];
  const bpSec=hasBP
    ?`<div class="bppl"><span class="bppi">⭐</span><div><div class="bppt">Best Practice Otomatik Yüklendi</div><div class="bpps">${(BP[d.id]?.files||[]).map(f=>f.name).join(' + ')}</div></div></div>`
    :`<div style="background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 12px;margin-bottom:10px;font-size:11px;color:var(--tx3)">Bu deliverable için Best Practice henüz yüklenmedi. Diğer fazların dosyaları eklenince kullanılabilir olacak.</div>`;
  const upSec=`<div class="stt" style="margin-top:10px">📨 Müşteri / Danışman Dosyası</div>
    <div class="upz ${con?'ld':''}" onclick="trUp('cu_${d.id}')"><div class="uzi">${con?'✅':'📁'}</div><div class="uzn">${con?con.name:'Müşteri dosyasını yükle'}</div><div class="uzs">.xlsx / .xls / .csv</div></div>
    <input type="file" id="cu_${d.id}" accept=".xlsx,.xls,.csv" class="hidden" onchange="fUp(this,'${d.id}')">`;
  const canRun=hasBP&&con;
  const btn=canRun
    ?`<button class="btn btn-g btn-w mt2" onclick="runAI('${d.id}')">🤖 AI Karşılaştırmayı Başlat</button>`
    :`<div style="text-align:center;font-size:11px;color:var(--tx3);padding:8px">${!hasBP?'Best Practice bu faz için henüz yüklenmedi.':!con?'Müşteri dosyasını yükleyince karşılaştırma yapabilirsiniz.':''}</div>`;
  let res='';
  if(p.air){
    const bnr=p.ai==='ok'
      ?`<div class="bnrg"><span class="bni">🟢</span><div><div class="bnt">Onaylandı — Yeşile geçirildi</div><div class="bns">Ön ekranda yeşil renkte gösterilecek.</div></div></div>`
      :`<div class="bnry"><span class="bni">🟡</span><div class="bnt" style="color:#92400E">AI fark tespit etti — Sarı işaretlendi<div class="bns">Değerlendirmenize göre onaylayabilirsiniz.</div></div><button class="btn btn-ok" style="margin-left:auto;white-space:nowrap" onclick="appr('${d.id}')">✅ Onayla → Yeşile Geçir</button></div>`;
    res=`<div class="mt3">${bnr}<div class="row" style="margin-bottom:10px"><div class="stt" style="margin:0">🤖 Analiz Sonucu</div><button class="btn btn-s" style="margin-left:auto" onclick="dlRep('${d.id}')">⬇️ Rapor İndir</button></div>${p.air}</div>`;
  }
  return `${bpSec}${upSec}${btn}${res}`;
}

/* XL STANDALONE */
function rXL(){
  const opts=Object.entries(DB).flatMap(([key,ds])=>{const[ph,ws]=key.split('_');const phn=PH.find(p=>p.id===ph)?.name,wsn=WS.find(w=>w.id===ws)?.name;return ds.filter(d=>d.hasBP||d.tpl).map(d=>`<option value="${d.id}">[${phn} › ${wsn}] ${d.name}</option>`);}).join('');
  return `<div style="background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:16px">
    <div style="font-size:14px;font-weight:700;margin-bottom:4px">🤖 AI Excel Karşılaştırma</div>
    <div style="font-size:11px;color:var(--tx3);margin-bottom:16px">Deliverable seçin, müşteri dosyasını yükleyin, AI Best Practice ile karşılaştırsın.</div>
    <div class="ff"><label class="fl">Deliverable Seç</label>
      <select class="fi" onchange="xSel(this.value)"><option value="">— Seçin —</option>${opts}</select>
    </div>
  </div><div id="xc"></div>`;
}

/* ══ ACTIONS ══ */
function gDash(){S.view='dash';S.cell=null;S.dId=null;render();}
function goXl(){S.view='xl';render();}
function gPh(phId){const f=WS.find(ws=>cD(phId,ws.id).length>0);if(f) oCell(phId,f.id);}
function oCell(ph,ws){const ds=cD(ph,ws);if(!ds.length) return;S.view='cell';S.cell={ph,ws};S.dId=ds[0].id;S.tab=ds[0].hasBP?'bp':'tasks';render();}
function sDel(id){S.dId=id;S.tab=fD(id)?.hasBP?'bp':'tasks';render();}
function sTab(t){S.tab=t;render();}
function tTask(id,i){
  if(!S.prog[id]) S.prog[id]={st:'ns',pct:0,notes:'',who:'',due:'',chk:{},ai:null,air:null};
  const p=S.prog[id];if(!p.chk)p.chk={};p.chk[i]=!p.chk[i];
  const d=fD(id);if(d){const dn=Object.values(p.chk).filter(Boolean).length;p.pct=Math.round((dn/d.tasks.length)*100);p.st=p.pct===100?'dn':p.pct>0?'ip':'ns';}
  save();render();
}
function sSt(id,st){if(!S.prog[id]) S.prog[id]={st,pct:0,notes:'',who:'',due:'',chk:{},ai:null,air:null};S.prog[id].st=st;save();render();}
function sPct(id,v){if(!S.prog[id]) S.prog[id]={st:'ns',pct:+v,notes:'',who:'',due:'',chk:{},ai:null,air:null};S.prog[id].pct=+v;const e=document.getElementById('pv_'+id);if(e)e.textContent=v+'%';}
function sF(id,f,v){if(!S.prog[id]) S.prog[id]={st:'ns',pct:0,notes:'',who:'',due:'',chk:{},ai:null,air:null};S.prog[id][f]=v;}
function svP(id){save();toast('✅ Kaydedildi');}
function appr(id){
  if(!S.prog[id]) S.prog[id]={st:'ns',pct:0,notes:'',who:'',due:'',chk:{},ai:null,air:null};
  S.prog[id].ai='ok';S.prog[id].st='dn';S.prog[id].pct=100;
  save();toast('🟢 Onaylandı — yeşile geçirildi!');render();
}
function trUp(id){document.getElementById(id)?.click();}
async function fUp(inp,id){
  const f=inp.files[0];if(!f) return;
  try{const d=await rdXL(f);S.files[id]={name:f.name,data:d};toast(`✅ ${f.name} yüklendi`);render();}
  catch(e){toast('❌ Dosya okunamadı');}
}
function rdXL(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'binary'});const o={};wb.SheetNames.forEach(s=>{o[s]=XLSX.utils.sheet_to_json(wb.Sheets[s],{header:1,defval:''});});res(o);}catch(e){rej(e);}};r.onerror=rej;r.readAsBinaryString(f);});}
function xl2txt(d){return Object.entries(d).map(([s,rows])=>`=== Sheet: ${s} ===\n${rows.slice(0,60).map(r=>r.join(' | ')).join('\n')}`).join('\n\n');}
function bp2txt(id){
  const b=BP[id];if(!b) return 'Best Practice bulunamadı.';
  return b.files.map(f=>{
    let t=`--- ${f.name} ---\n${f.summary||''}\n`;
    if(f.sections) f.sections.forEach(s=>{t+=`\n## ${s.title}\n`;s.items.forEach(i=>t+=`• ${i}\n`);});
    if(f.tableHeaders) t+=`\nŞablon sütunları: ${f.tableHeaders.join(' | ')}\n`;
    return t;
  }).join('\n\n');
}
async function runAI(id){
  const con=S.files[id];if(!con) return;const d=fD(id);
  load2(true,'AI analiz ediyor… (~20 sn)');
  try{
    const prompt=`Sen bir SAP S/4HANA implementasyon QA uzmanısın.
Deliverable: "${d.name}" (SAP Activate – S/4HANA Cloud Private Edition)

BEST PRACTICE İÇERİĞİ (SAP resmi belgelerden):
${bp2txt(id)}

MÜŞTERİ / DANIŞMAN DOSYASI:
${xl2txt(con.data)}

Karşılaştır. SADECE şu JSON yapısında yanıt ver, başka metin ekleme:
{"summary":"2-3 cümle genel özet","overall_score":72,"critical_gaps":["yöntemsel eksik 1","eksik 2"],"warnings":["içerik farklılığı","risk","eksik plan"],"additions":["olumlu katkı varsa"],"recommendations":["öneri 1","öneri 2"]}`;
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
    const data=await resp.json();
    const txt=data.content?.find(b=>b.type==='text')?.text||'';
    let parsed;try{parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());}catch(e){parsed={summary:txt,overall_score:0,critical_gaps:[],warnings:[],additions:[],recommendations:[]};}
    if(!S.prog[id]) S.prog[id]={st:'ns',pct:0,notes:'',who:'',due:'',chk:{},ai:null,air:null};
    S.prog[id].air=bldRes(parsed);
    S.prog[id].ai='diff';
    save();load2(false);S.tab='ai';render();
  }catch(e){load2(false);toast('❌ AI hatası: '+e.message);}
}
function bldRes(r){
  const sc=r.overall_score||0;const sc2=sc>=80?'#16A34A':sc>=60?'#D97706':'#DC2626';
  const sec=(items,hc,bc,em,ttl)=>{if(!items?.length) return '';return`<div class="gps"><div class="gph ${hc}">${em} ${ttl} (${items.length})</div>${items.map(i=>`<div class="gpi" style="border-left-color:${bc}">${i}</div>`).join('')}</div>`;};
  return `<div class="aisr"><div class="aisn" style="color:${sc2}">${sc}%</div><div><div class="aisl">Best Practice Uyumu</div><div class="aist">${r.summary}</div></div></div>
    ${sec(r.critical_gaps,'gc','#DC2626','🔴','Yöntemsel / Kritik Eksiklikler')}
    ${sec(r.warnings,'gw','#D97706','⚠️','İçerik Farklılıkları & Riskler')}
    ${sec(r.additions,'gi','#1D4ED8','ℹ️','Müşteri Eklemeleri')}
    ${sec(r.recommendations,'gk','#16A34A','✅','Öneriler')}`;
}
function dlRep(id){
  const d=fD(id),p=gP(id);if(!p.air) return;
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SAP QA – ${d.name}</title>
